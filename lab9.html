<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Шагайн тоглоом</title>

  <style>
    body{
      margin:0;
      background:black;
      font-family:Arial, sans-serif;
    }

    .header{
      color:white;
      font-size:32px;
      padding:20px 30px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .game-box{
      width:90%;
      margin:0 auto 30px auto;
      background:#ddd;
      border-radius:12px;
      padding:25px 30px 40px 30px;
      position:relative;
      box-sizing:border-box;
      min-height:650px;
    }

    .top-bar{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .dice-area{
      display:flex;
      gap:12px;
      align-items:center;
      font-size:42px;
    }

    .roll-btn{
      background:#c97c05;
      color:white;
      border:none;
      border-radius:10px;
      padding:12px 22px;
      font-size:18px;
      cursor:pointer;
    }

    .roll-btn:hover{
      opacity:0.9;
    }

    .reset-btn{
      background:white;
      color:black;
      border:1px solid #999;
      border-radius:10px;
      padding:12px 18px;
      font-size:16px;
      cursor:pointer;
    }

    .reset-btn:hover{
      background:#f2f2f2;
    }

    .turn-text{
      font-size:18px;
      font-weight:bold;
      margin-left:10px;
      color:white;
    }

    .result-text{
      font-size:17px;
      margin-bottom:18px;
      font-weight:bold;
      color:#222;
      min-height:24px;
    }

    .score-text{
      font-size:22px;
      font-weight:bold;
      color:#222;
      margin-bottom:40px;
      display:flex;
      gap:40px;
      flex-wrap:wrap;
    }

    .race-area{
      position:relative;
      height:320px;
      margin-top:20px;
    }

    .label1, .label2{
      position:absolute;
      left:0;
      font-size:42px;
      color:white;
    }

    .label1{
      top:90px;
    }

    .label2{
      top:200px;
    }

    .side-horse{
      position:absolute;
      left:180px;
      font-size:72px;
      line-height:1;
    }

    .side-horse1{
      top:75px;
    }

    .side-horse2{
      top:185px;
    }

    .track{
      position:absolute;
      left:300px;
      right:60px;
      top:165px;
      height:4px;
      background:black;
    }

    .runner{
      position:absolute;
      left:0;
      font-size:64px;
      line-height:1;
      transition:left 0.45s ease;
    }

    .runner1{
      top:-95px;
    }

    .runner2{
      top:18px;
    }

    .finish-line{
      position:absolute;
      right:-22px;
      top:-135px;
      width:22px;
      height:270px;
      background:repeating-linear-gradient(
        to bottom,
        white 0px,
        white 12px,
        black 12px,
        black 24px
      );
    }

    .winner{
      margin-top:30px;
      padding:16px;
      text-align:center;
      font-size:22px;
      font-weight:bold;
      background:#efe4bd;
      border:2px solid #d39e00;
      border-radius:14px;
      color:white;
      display:none;
    }
  </style>
</head>
<body>
    
  <div class="game-box">
    <div class="top-bar">
      <div class="dice-area" id="diceArea">
        <span>🐎</span>
        <span>🐪</span>
        <span>🐐</span>
        <span>🐏</span>
      </div>

      <button class="roll-btn" id="rollBtn" onclick="rollDice()">Шагай орхих</button>
      <button class="reset-btn" onclick="resetGame()">Дахин эхлэх</button>

      <div class="turn-text" id="turnText">Ээлж: Тоглогч 1</div>
    </div>

    <div class="result-text" id="resultText"></div>

    <div class="score-text">
      <div>Тоглогч 1 оноо: <span id="score1">0</span></div>
      <div>Тоглогч 2 оноо: <span id="score2">0</span></div>
    </div>

    <div class="race-area">
      <div class="label1">ТОГЛОГЧ 1</div>
      <div class="label2">ТОГЛОГЧ 2</div>

      <div class="side-horse side-horse1">🐎</div>
      <div class="side-horse side-horse2">🐎</div>

      <div class="track" id="track">
        <div class="runner runner1" id="horse1">🐎</div>
        <div class="runner runner2" id="horse2">🐎</div>
        <div class="finish-line"></div>
      </div>
    </div>

    <div class="winner" id="winnerBox"></div>
  </div>

  <script>
    const faces = ["🐏", "🐐", "🐪", "🐎"];

    let turn = 1;
    let score1 = 0;
    let score2 = 0;
    let pos1 = 0;
    let pos2 = 0;
    let gameOver = false;

    function getFinishDistance(playerId){
      const player = document.getElementById(playerId);
      const track = document.getElementById("track");
      const finishLine = track.querySelector(".finish-line");
      return track.clientWidth - finishLine.offsetWidth - player.offsetWidth;
    }

    function rollDice(){
      if(gameOver) return;

      let results = [];
      let horseCount = 0;

      for(let i = 0; i < 4; i++){
        let randomFace = faces[Math.floor(Math.random() * faces.length)];
        results.push(randomFace);
        if(randomFace === "🐎"){
          horseCount++;
        }
      }

      document.getElementById("diceArea").innerHTML =
        results.map(item => `<span>${item}</span>`).join("");

      let step = horseCount * 60;

      if(turn === 1){
        pos1 += step;

        const finish1 = getFinishDistance("horse1");
        if(pos1 >= finish1){//ene
          pos1 = finish1;
        }

        document.getElementById("horse1").style.left = pos1 + "px";

        score1 += horseCount;
        document.getElementById("score1").textContent = score1;

        document.getElementById("resultText").textContent =
          `Тоглогч 1: ${horseCount} морь гарлаа`;

        if(pos1 >= finish1){
          showWinner("Тоглогч 1 яллаа!");
          return;
        }

        turn = 2;
        document.getElementById("turnText").textContent = "Ээлж: Тоглогч 2";
      }
      else{
        pos2 += step;

        const finish2 = getFinishDistance("horse2");
        if(pos2 >= finish2){//ene
          pos2 = finish2;
        }

        document.getElementById("horse2").style.left = pos2 + "px";

        score2 += horseCount;
        document.getElementById("score2").textContent = score2;

        document.getElementById("resultText").textContent =
          `Тоглогч 2: ${horseCount} морь гарлаа`;

        if(pos2 >= finish2){//ene
          showWinner("Тоглогч 2 яллаа!");
          return;
        }

        turn = 1;
        document.getElementById("turnText").textContent = "Ээлж: Тоглогч 1";
      }
    }

    function showWinner(text){
      gameOver = true;
      
      document.getElementById("winnerBox").style.display = "block";
      document.getElementById("winnerBox").textContent = text;
      document.getElementById("rollBtn").disabled = true;
    }

    function resetGame(){
      turn = 1;
      score1 = 0;
      score2 = 0;
      pos1 = 0;
      pos2 = 0;
      gameOver = false;

      document.getElementById("diceArea").innerHTML = `
        <span>🐎</span>
        <span>🐪</span>
        <span>🐐</span>
        <span>🐏</span>
      `;

      document.getElementById("horse1").style.left = "0px";
      document.getElementById("horse2").style.left = "0px";

      document.getElementById("score1").textContent = "0";
      document.getElementById("score2").textContent = "0";

      document.getElementById("turnText").textContent = "Ээлж: Тоглогч 1";
      document.getElementById("resultText").textContent = "";

      document.getElementById("winnerBox").style.display = "none";
      document.getElementById("winnerBox").textContent = "";

      document.getElementById("rollBtn").disabled = false;
    }

    window.addEventListener("resize", () => {
      const finish1 = getFinishDistance("horse1");
      const finish2 = getFinishDistance("horse2");

      if(pos1 > finish1) pos1 = finish1;
      if(pos2 > finish2) pos2 = finish2;

      document.getElementById("horse1").style.left = pos1 + "px";
      document.getElementById("horse2").style.left = pos2 + "px";
    });
  </script>

</body>
</html>
